databases:
  # PostgreSQL Database (Managed)
  - name: odoo-db
    databaseName: odoo
    user: odoo
    plan: free

services:
  # Odoo Application
  - type: web
    name: odoo-urfu-demo
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /web/database/manager
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: odoo-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true

services:
  db:
    image: postgres:17
    container_name: odoo_db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  odoo:
    image: odoo:17.0
    container_name: odoo_app
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo_data:/var/lib/odoo

# TODO наш кастомный модуль     - ./custom_addons:/mnt/custom-addons

# TODO      - ./odoo.conf:/etc/odoo/odoo.conf
    restart: always

volumes:
  db_data:
  odoo_data:

[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

# Database settings
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
# Must match scripts/init.sh and fix_passwords.sh (-d odoo)
db_name = odoo

# Database manager settings
admin_passwd = admin
list_db = True
dbfilter = .*

# Server settings
xmlrpc_port = 8069
workers = 0

# Logging
log_level = info
